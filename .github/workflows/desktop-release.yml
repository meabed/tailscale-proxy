name: desktop-release

# Build the Wails desktop app on each OS and publish a GitHub release with the
# installers. Manual: run from the Actions tab with a version (e.g. 0.1.0).
# The desktop app is a separate Go module under desktop/ — this pipeline is
# independent of the CLI's semantic-release.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version, e.g. 0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, label: macos } # universal (arm64 + amd64)
          - { os: windows-latest, label: windows }
          - { os: ubuntu-latest, label: linux }
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
        working-directory: desktop
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "stable"

      - name: Linux webview deps
        if: runner.os == 'Linux'
        # Wails v3 uses GTK4 + WebKitGTK 6.0 on Linux.
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev

      - name: Build and package
        env:
          VERSION: ${{ inputs.version }}
          LABEL: ${{ matrix.label }}
          CGO_ENABLED: "1"
        run: |
          set -euo pipefail
          LD="-s -w -X github.com/meabed/tailscale-proxy/core.Version=${VERSION}"
          mkdir -p ../dist
          # Stable, version-less asset names so releases/download/desktop-latest/<name>
          # is a permanent direct-download link per platform.
          case "$LABEL" in
            macos)
              # Native arm64; cross-build amd64 too and lipo into a universal binary
              # (falls back to arm64-only if the amd64 cross-build fails).
              CGO_ENABLED=1 GOARCH=arm64 go build -trimpath -ldflags "$LD" -o tsp-arm64 .
              if CGO_ENABLED=1 GOARCH=amd64 go build -trimpath -ldflags "$LD" -o tsp-amd64 . ; then
                lipo -create -output tailscale-proxy tsp-arm64 tsp-amd64
              else
                echo "amd64 cross-build failed — shipping arm64-only"; cp tsp-arm64 tailscale-proxy
              fi
              bash scripts/make-macos-dmg.sh "$VERSION" tailscale-proxy "../dist/Tailscale-Proxy-macOS.dmg"
              ;;
            windows)
              go build -trimpath -ldflags "$LD -H windowsgui" -o TailscaleProxy.exe .
              7z a "../dist/Tailscale-Proxy-Windows.zip" TailscaleProxy.exe
              ;;
            linux)
              go build -trimpath -ldflags "$LD" -o tailscale-proxy .
              tar czf "../dist/Tailscale-Proxy-Linux.tar.gz" tailscale-proxy
              ;;
          esac
          ls -la ../dist

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - run: ls -la dist
      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          # Rolling tag → permanent download URLs (releases/download/desktop-latest/<asset>)
          # that don't collide with the CLI's own `releases/latest`.
          tag_name: desktop-latest
          name: Tailscale Proxy desktop ${{ inputs.version }}
          make_latest: false
          files: dist/*
          body: |
            **Tailscale Proxy** menu-bar app ${{ inputs.version }} — a tray UI over the `tsp` engine.

            | Platform | Download |
            | --- | --- |
            | macOS (Apple Silicon & Intel) | [Tailscale-Proxy-macOS.dmg](https://github.com/meabed/tailscale-proxy/releases/download/desktop-latest/Tailscale-Proxy-macOS.dmg) |
            | Windows | [Tailscale-Proxy-Windows.zip](https://github.com/meabed/tailscale-proxy/releases/download/desktop-latest/Tailscale-Proxy-Windows.zip) |
            | Linux | [Tailscale-Proxy-Linux.tar.gz](https://github.com/meabed/tailscale-proxy/releases/download/desktop-latest/Tailscale-Proxy-Linux.tar.gz) |

            ### Install
            - **macOS** — open the `.dmg`, drag **Tailscale Proxy** to Applications. It's unsigned, so the first launch needs: right-click the app → **Open** (or `xattr -dr com.apple.quarantine "/Applications/Tailscale Proxy.app"`). It lives in the **menu bar** (no Dock icon).
            - **Windows** — unzip and run `TailscaleProxy.exe`. SmartScreen may warn (unsigned): **More info → Run anyway**.
            - **Linux** — `tar xzf` and run `./tailscale-proxy`. Needs GTK4 + WebKitGTK 6.0 (`sudo apt install libgtk-4-1 libwebkitgtk-6.0-4`).

            Requires [Tailscale](https://tailscale.com/download) installed and signed in — the app shows setup steps if it isn't.
